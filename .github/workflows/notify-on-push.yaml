name: Trigger sync on push to main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate as GitHub app
        id: generate_token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.AUTOMATION_CLIENT_ID }}
          installation_id: ${{ secrets.AUTOMATION_CLIENT_INSTALLATION }}
          private_key: ${{ secrets.AUTOMATION_CLIENT_SECRET }}

      - name: Trigger sync workflows
        run: |
          status=0
          for branch in 5.0 6.0; do
            curl -f -X POST \
              -H "Authorization: Bearer ${{ steps.generate_token.outputs.token }}" \
              -H "Accept: application/vnd.github+json" \
              "${{ vars.SYNC_WEBHOOK_URL }}" \
              -d "{\"ref\":\"$branch\"}" || { echo "::error::Failed to trigger sync for $branch"; status=1; }
          done
          exit $status
